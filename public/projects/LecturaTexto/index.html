<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor texto a voz</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.min.js" integrity="sha384-cuYeSxntonz0PPNlHhBs68uyIAVpIIOZZ5JqeqvYYIcEL727kskC66kF92t6Xl2V" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
</head>
<body>
    
    <div class="hero row">
        <h1 class="col-lg-6 col-8 mt-3 d-flex justify-content-center">Conversor de texto a voz</h1>
        <textarea class="col-lg-6 col-11" name="textarea" placeholder="Escribe el texto que vas a convertir aquí"></textarea>
        <div class="row d-flex justify-content-center">
            <select class="col-lg-4 col-11"></select>
            <button id="btn" class="col-lg-2 col-11 rounded"><img src="img/play.png" alt="icono"> Escuchar</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
